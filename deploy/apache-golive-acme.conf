<VirtualHost *:80>
    ServerName @GOLIVE_DOMAIN@

    ProxyPreserveHost On
    ProxyPass        /.well-known/acme-challenge/ http://127.0.0.1:@ACME_PORT@/.well-known/acme-challenge/ retry=0
    ProxyPassReverse /.well-known/acme-challenge/ http://127.0.0.1:@ACME_PORT@/.well-known/acme-challenge/

</VirtualHost>
