name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install Syft for release SBOMs
        uses: anchore/sbom-action/download-syft@v0

      - name: Publish GitHub release packages
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable emulated architectures
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GoLive NMS image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/terminaladdict/golive-nms:${{ github.ref_name }}
            ghcr.io/terminaladdict/golive-nms:latest
          cache-from: type=gha,scope=golive-nms
          cache-to: type=gha,mode=max,scope=golive-nms

      - name: Publish GoLive backup image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: admin-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/terminaladdict/golive-admin:${{ github.ref_name }}
            ghcr.io/terminaladdict/golive-admin:latest
          cache-from: type=gha,scope=golive-admin
          cache-to: type=gha,mode=max,scope=golive-admin
