name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25.x', cache: true}
      - uses: goreleaser/goreleaser-action@v6
        with: {distribution: goreleaser, version: '~> v2', args: release --clean}
        env: {GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: app-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: admin-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/golive-admin:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/golive-admin:latest
